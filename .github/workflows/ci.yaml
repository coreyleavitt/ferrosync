name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      - name: Build
        run: cargo build -p ferrosync-core -p ferrosync-cli

      - name: Run unit tests
        run: cargo test -p ferrosync-core -p ferrosync-cli --lib

      - name: Run transfer engine tests (Unix only)
        if: runner.os != 'Windows'
        run: cargo test -p ferrosync-core --test transfer_engine

      - name: Run daemon tests
        run: cargo test -p ferrosync-core --test daemon

      - name: Run doc tests
        run: cargo test -p ferrosync-core -p ferrosync-cli --doc

  interop:
    name: Rsync interop (Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build and start test containers
        run: docker compose -f docker-compose.test.yml up -d --build

      - name: Wait for SSH target
        run: |
          for i in $(seq 1 30); do
            docker compose -f docker-compose.test.yml exec -T rsync-ssh-target ssh-keygen -A 2>/dev/null && break
            sleep 1
          done

      - name: Run rsync interop tests
        run: |
          docker compose -f docker-compose.test.yml run --rm ferrosync-dev \
            cargo test -p ferrosync-core --test rsync_interop

      - name: Collect logs on failure
        if: failure()
        run: docker compose -f docker-compose.test.yml logs

      - name: Tear down
        if: always()
        run: docker compose -f docker-compose.test.yml down

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: clippy
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.os }}
      - run: cargo clippy -p ferrosync-core -p ferrosync-cli --all-targets -- -D warnings

  python-bindings:
    name: Python bindings (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - name: Install uv
        uses: astral-sh/setup-uv@v7
      - name: Install maturin
        run: uv pip install --system maturin
      - name: Build ferrosync-py
        run: maturin build -m crates/ferrosync-py/Cargo.toml

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          components: rustfmt
      - run: cargo fmt --all -- --check
