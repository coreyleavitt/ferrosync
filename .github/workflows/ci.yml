name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.os }}

      # rsync is needed for integration tests (LocalTransport spawns rsync --server)
      - name: Install rsync (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rsync

      - name: Install rsync (macOS)
        if: runner.os == 'macOS'
        run: brew install rsync

      - name: Install rsync (Windows)
        if: runner.os == 'Windows'
        run: choco install rsync -y

      - name: Set up Python (for ferrosync-py)
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=$(sw_vers -productVersion)" >> "$GITHUB_ENV"

      - name: Build
        run: cargo build --workspace

      - name: Run unit tests
        run: cargo test --workspace --lib

      - name: Run integration tests (Unix only)
        if: runner.os != 'Windows'
        run: cargo test -p ferrosync-core --test rsync_compat

      - name: Run E2E tests (Unix only)
        if: runner.os != 'Windows'
        run: cargo test -p ferrosync-core --test e2e

      - name: Run doc tests
        run: cargo test --workspace --doc

  clippy:
    name: Clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Set macOS deployment target
        if: runner.os == 'macOS'
        run: echo "MACOSX_DEPLOYMENT_TARGET=$(sw_vers -productVersion)" >> "$GITHUB_ENV"
      - uses: Swatinem/rust-cache@v2
        with:
          key: clippy-${{ matrix.os }}
      - run: cargo clippy --workspace --all-targets -- -D warnings

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

