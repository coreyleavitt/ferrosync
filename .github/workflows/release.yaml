name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (use "none" to only increment prerelease number)'
        required: true
        type: choice
        options:
          - none
          - patch
          - minor
          - major
          - stable
      prerelease:
        description: 'Prerelease label (or none for stable release)'
        required: true
        default: 'no'
        type: choice
        options:
          - 'no'
          - alpha
          - beta
          - rc

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  prepare-version:
    name: Prepare version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      commit_sha: ${{ steps.version.outputs.commit_sha }}
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - name: Compute and apply version
        id: version
        run: |
          BUMP="${{ inputs.bump }}"
          PRERELEASE="${{ inputs.prerelease }}"

          # Read current version from workspace Cargo.toml.
          CURRENT=$(grep '^version' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "Current version: $CURRENT"

          # Parse current version.
          BASE=$(echo "$CURRENT" | sed 's/-.*//')
          MAJOR=$(echo "$BASE" | cut -d. -f1)
          MINOR=$(echo "$BASE" | cut -d. -f2)
          PATCH=$(echo "$BASE" | cut -d. -f3)
          CURRENT_PRE_TYPE=$(echo "$CURRENT" | sed -n 's/.*-\([a-z]*\)\.\([0-9]*\)$/\1/p')
          CURRENT_PRE_NUM=$(echo "$CURRENT" | sed -n 's/.*-\([a-z]*\)\.\([0-9]*\)$/\2/p')

          # Validate inputs.
          if [ "$BUMP" = "none" ] && [ "$PRERELEASE" = "no" ]; then
            echo "::error::bump=none requires a prerelease label"
            exit 1
          fi
          if [ "$BUMP" = "stable" ] && [ -z "$CURRENT_PRE_TYPE" ]; then
            echo "::error::bump=stable requires a current prerelease version"
            exit 1
          fi

          # Apply version bump.
          case "$BUMP" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
            stable|none) ;; # keep base version as-is
          esac

          VERSION="${MAJOR}.${MINOR}.${PATCH}"

          # Apply prerelease suffix.
          if [ "$BUMP" = "stable" ] || [ "$PRERELEASE" = "no" ]; then
            : # stable release, no suffix
          elif [ "$BUMP" = "none" ] && [ "$CURRENT_PRE_TYPE" = "$PRERELEASE" ]; then
            # Same prerelease type, just increment the number.
            PRE_NUM=$((${CURRENT_PRE_NUM:-0} + 1))
            VERSION="${VERSION}-${PRERELEASE}.${PRE_NUM}"
          else
            # New prerelease series.
            VERSION="${VERSION}-${PRERELEASE}.1"
          fi

          echo "New version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

          # Update Cargo.toml and lockfile.
          sed -i "0,/^version = \".*\"/s//version = \"$VERSION\"/" Cargo.toml
          cargo generate-lockfile

          # Commit via GitHub API (signed).
          CARGO_TOML_BLOB=$(base64 -w 0 Cargo.toml | jq -Rs '{content: ., encoding: "base64"}' | \
            gh api repos/${{ github.repository }}/git/blobs --input - --jq '.sha')

          CARGO_LOCK_BLOB=$(base64 -w 0 Cargo.lock | jq -Rs '{content: ., encoding: "base64"}' | \
            gh api repos/${{ github.repository }}/git/blobs --input - --jq '.sha')

          TREE_SHA=$(gh api repos/${{ github.repository }}/git/trees \
            -f base_tree="${{ github.sha }}" \
            -f 'tree[][path]=Cargo.toml' \
            -f 'tree[][mode]=100644' \
            -f 'tree[][type]=blob' \
            -f "tree[][sha]=$CARGO_TOML_BLOB" \
            -f 'tree[][path]=Cargo.lock' \
            -f 'tree[][mode]=100644' \
            -f 'tree[][type]=blob' \
            -f "tree[][sha]=$CARGO_LOCK_BLOB" \
            --jq '.sha')

          COMMIT_SHA=$(gh api repos/${{ github.repository }}/git/commits \
            -f message="Release v${VERSION}" \
            -f tree="$TREE_SHA" \
            -f "parents[]=${{ github.sha }}" \
            --jq '.sha')

          # Update branch ref.
          gh api repos/${{ github.repository }}/git/refs/heads/${{ github.ref_name }} \
            -X PATCH \
            -f sha="$COMMIT_SHA"

          # Create tag.
          gh api repos/${{ github.repository }}/git/refs \
            -f ref="refs/tags/v${VERSION}" \
            -f sha="$COMMIT_SHA"

          echo "commit_sha=$COMMIT_SHA" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build:
    name: Build (${{ matrix.target }})
    needs: prepare-version
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: ferrosync-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: ferrosync-macos-aarch64
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: ferrosync-macos-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: ferrosync-windows-x86_64

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare-version.outputs.commit_sha }}

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.94.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p ferrosync-cli

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../${{ matrix.artifact }}.tar.gz ferrosync
          cd ../../..
          sha256sum ${{ matrix.artifact }}.tar.gz > ${{ matrix.artifact }}.tar.gz.sha256

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/ferrosync.exe -DestinationPath ${{ matrix.artifact }}.zip
          (Get-FileHash ${{ matrix.artifact }}.zip -Algorithm SHA256).Hash.ToLower() + "  ${{ matrix.artifact }}.zip" | Out-File -Encoding ascii ${{ matrix.artifact }}.zip.sha256

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: |
            ${{ matrix.artifact }}.tar.gz
            ${{ matrix.artifact }}.tar.gz.sha256
            ${{ matrix.artifact }}.zip
            ${{ matrix.artifact }}.zip.sha256

  release:
    name: Create release
    needs: [prepare-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub release
        run: |
          VERSION="${{ needs.prepare-version.outputs.version }}"
          if echo "$VERSION" | grep -qE '\-(alpha|beta|rc)\.'; then
            gh release create "v$VERSION" artifacts/* --repo ${{ github.repository }} --generate-notes --prerelease
          else
            gh release create "v$VERSION" artifacts/* --repo ${{ github.repository }} --generate-notes
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
